name: Auto Download Portfolio Weights

on:
  schedule:
    # Runs every Friday at 16:00 UTC (Change to your preference)
    - cron: '0 16 * * 5'
  # Allows you to manually trigger the download anytime via GitHub UI
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance lxml requests html5lib

    - name: Execute Download Script
      run: python fetch_holdings.py

    - name: Commit and Push Data to Repo
      run: |
        git config --global user.name "Automated Bot"
        git config --global user.email "bot@github.com"
        git add holdings_history/*.csv *_latest.csv
        git diff-index --quiet HEAD || git commit -m "Auto-update: Top 20 weights for $(date +'%Y-%m-%d')"
        git push




